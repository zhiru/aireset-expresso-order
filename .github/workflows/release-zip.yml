name: Release Plugin Zip

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Prepare distributable plugin folder
        run: php scripts/build-release-package.php

      - name: Create plugin zip
        run: |
          cd dist
          zip -r ../aireset-expresso-order.zip aireset-expresso-order

      - name: Upload zip to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: aireset-expresso-order.zip

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aireset-expresso-order
          path: aireset-expresso-order.zip
