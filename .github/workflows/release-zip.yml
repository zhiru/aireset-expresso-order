name: Release Plugin Zip

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Prepare distributable plugin folder
        run: php scripts/build-release-package.php

      - name: Verify obfuscated release files
        run: |
          php -r "
          \$files = [
            'dist/aireset-expresso-order/includes/class-admin-page.php',
            'dist/aireset-expresso-order/includes/class-eop-license-base.php',
            'dist/aireset-expresso-order/includes/class-eop-license-manager.php',
            'dist/aireset-expresso-order/includes/class-eop-integrity.php',
            'dist/aireset-expresso-order/includes/trait-eop-license-guard.php',
            'dist/aireset-expresso-order/includes/class-eop-telemetry.php',
          ];
          foreach (\$files as \$file) {
            if (!is_file(\$file)) {
              fwrite(STDERR, 'Missing expected obfuscated file: ' . \$file . PHP_EOL);
              exit(1);
            }
            \$contents = file_get_contents(\$file);
            if (
              \$contents === false ||
              strpos(\$contents, 'gzuncompress') === false ||
              strpos(\$contents, 'base64_decode') === false ||
              strpos(\$contents, 'eval("?>".') === false ||
              preg_match('/\R/', \$contents) === 1
            ) {
              fwrite(STDERR, 'Release file does not look obfuscated: ' . \$file . PHP_EOL);
              exit(1);
            }
          }
          "

      - name: Create plugin zip
        run: |
          cd dist
          zip -r ../aireset-expresso-order.zip aireset-expresso-order

      - name: Upload zip to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: aireset-expresso-order.zip

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aireset-expresso-order
          path: aireset-expresso-order.zip
